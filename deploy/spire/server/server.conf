# SPIRE server for the VSP trust domain. Demo-grade: in-memory keys + sqlite,
# join_token node attestation (agents present a one-time token issued by the
# server). Production would use a durable KeyManager/UpstreamAuthority and a
# real node attestor (k8s_psat, aws_iid, ...).
server {
  bind_address       = "0.0.0.0"
  bind_port          = "8081"
  trust_domain       = "vsp.local"
  data_dir           = "/opt/spire/data/server"
  log_level          = "INFO"
  ca_ttl             = "24h"
  default_x509_svid_ttl = "1h"
}

plugins {
  DataStore "sql" {
    plugin_data {
      database_type     = "sqlite3"
      connection_string = "/opt/spire/data/server/datastore.sqlite3"
    }
  }

  NodeAttestor "join_token" {
    plugin_data {}
  }

  KeyManager "memory" {
    plugin_data {}
  }
}
