# SPIRE server for the VSP trust domain — production-grade attestation + CA.
#
#   NodeAttestor "x509pop"     — agents prove identity with an X.509 node cert
#                                (signed by the node CA), not a bearer join token.
#   UpstreamAuthority "disk"   — the server's CA is an intermediate signed by the
#                                org upstream root, so every SVID chains to a real
#                                root CA instead of a SPIRE self-signed one.
#   KeyManager "disk"          — signing keys persist across restarts.
server {
  bind_address          = "0.0.0.0"
  bind_port             = "8081"
  trust_domain          = "vsp.local"
  data_dir              = "/opt/spire/data/server"
  log_level             = "INFO"
  ca_ttl                = "24h"
  default_x509_svid_ttl = "1h"
}

plugins {
  DataStore "sql" {
    plugin_data {
      database_type     = "sqlite3"
      connection_string = "/opt/spire/data/server/datastore.sqlite3"
    }
  }

  NodeAttestor "x509pop" {
    plugin_data {
      ca_bundle_path = "/opt/spire/conf/server/node-ca.crt"
    }
  }

  UpstreamAuthority "disk" {
    plugin_data {
      cert_file_path = "/opt/spire/conf/server/upstream-root.crt"
      key_file_path  = "/opt/spire/conf/server/upstream-root.key"
    }
  }

  KeyManager "disk" {
    plugin_data {
      keys_path = "/opt/spire/data/server/keys.json"
    }
  }
}
