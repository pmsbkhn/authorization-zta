# SPIRE server variant whose CA is signed by a real HashiCorp Vault PKI
# (UpstreamAuthority "vault") instead of a disk root. SPIRE sends its
# intermediate CSR to Vault's pki/root/sign-intermediate, so every issued SVID
# chains to the Vault-managed root. Node attestation stays x509pop.
server {
  bind_address          = "0.0.0.0"
  bind_port             = "8081"
  trust_domain          = "vsp.local"
  data_dir              = "/opt/spire/data/server"
  log_level             = "INFO"
  ca_ttl                = "24h"
  default_x509_svid_ttl = "1h"
}

plugins {
  DataStore "sql" {
    plugin_data {
      database_type     = "sqlite3"
      connection_string = "/opt/spire/data/server/datastore.sqlite3"
    }
  }

  NodeAttestor "x509pop" {
    plugin_data {
      ca_bundle_path = "/opt/spire/conf/server/node-ca.crt"
    }
  }

  UpstreamAuthority "vault" {
    plugin_data {
      vault_addr           = "http://vault:8200"
      pki_mount_point      = "pki"
      insecure_skip_verify = true
      token_auth {
        token = "root"
      }
    }
  }

  KeyManager "disk" {
    plugin_data {
      keys_path = "/opt/spire/data/server/keys.json"
    }
  }
}
