# SPIRE agent. It node-attests to the server with a join token, then issues
# X509-SVIDs to local workloads over the Workload API socket (shared volume).
#
# Workload attestation uses the unix plugin: it reads the calling process's
# credentials (SO_PEERCRED) over the socket, so registration entries select
# workloads by uid (each VSP service runs under a distinct uid). This needs no
# host PID namespace or docker socket — it works cleanly across containers.
agent {
  data_dir           = "/opt/spire/data/agent"
  log_level          = "INFO"
  server_address     = "spire-server"
  server_port        = "8081"
  socket_path        = "/run/spire/agent.sock"
  trust_domain       = "vsp.local"
  insecure_bootstrap = true
}

plugins {
  NodeAttestor "join_token" {
    plugin_data {}
  }

  KeyManager "memory" {
    plugin_data {}
  }

  WorkloadAttestor "unix" {
    plugin_data {}
  }
}
