# SPIRE agent — production-grade node attestation.
#
# The agent presents its X.509 node cert (x509pop) to attest; the server derives
# a stable agent SPIFFE ID from the cert. No join token, no insecure bootstrap:
# trust_bundle_path pins the upstream root so the agent verifies the server's
# identity cryptographically on first contact.
#
# Workloads are still attested by unix uid (each VSP service runs a distinct uid).
agent {
  data_dir          = "/opt/spire/data/agent"
  log_level         = "INFO"
  server_address    = "spire-server"
  server_port       = "8081"
  socket_path       = "/run/spire/agent.sock"
  trust_domain      = "vsp.local"
  trust_bundle_path = "/opt/spire/conf/agent/bundle.crt"
}

plugins {
  NodeAttestor "x509pop" {
    plugin_data {
      certificate_path = "/opt/spire/conf/agent/agent-svid.crt"
      private_key_path = "/opt/spire/conf/agent/agent-svid.key"
    }
  }

  KeyManager "disk" {
    plugin_data {
      directory = "/opt/spire/data/agent"
    }
  }

  WorkloadAttestor "unix" {
    plugin_data {}
  }
}
